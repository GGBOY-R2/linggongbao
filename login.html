<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灵工保｜登录入口</title>
  <meta name="description" content="灵工保登录入口 - 灵活就业者一站式社保服务平台" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="page-login">
  <div class="site-shell">
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./login.html">
          <img src="./1.jpg" alt="灵工保 Logo" />
          <span>灵工保</span>
        </a>
        <nav class="nav-links">
          <a href="./index.html#home">产品首页</a>
          <a href="./index.html#plans">保障方案</a>
          <a href="./index.html#policy">政策直通车</a>
        </nav>
      </div>
    </header>

    <main class="site-main login-main">
      <section class="login-card">
        <div class="login-logo">
          <img src="./1.jpg" alt="灵工保 Logo" />
        </div>
        <div class="login-copy">
          <span class="pill">大学生创业大赛商业 Demo</span>
          <h1>欢迎进入灵工保</h1>
          <p>为灵活就业者提供更省心、更透明、更智能的社保服务体验。</p>
        </div>

        <form id="loginForm" class="form-grid">
          <div class="input-group">
            <label for="account">手机号 / 账号</label>
            <input id="account" name="account" type="text" placeholder="请输入手机号或账号" />
          </div>
          <div class="input-group">
            <label for="password">验证码 / 密码</label>
            <input id="password" name="password" type="password" placeholder="请输入验证码或密码" />
          </div>
          <div class="action-row">
            <button type="submit" class="btn">登录</button>
            <button type="button" class="btn btn-secondary" id="registerBtn">注册</button>
          </div>
        </form>

        <p class="helper-text">演示版本无需真实校验，点击登录或注册即可进入产品首页。</p>
      </section>
    </main>

    <footer class="site-footer">
      © 2026 灵工保 - 灵活就业者一站式社保服务平台 | 第五届“京彩大创”参赛项目。
    </footer>
  </div>

  <script>
    function enterPlatform() {
      window.location.href = './index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function (event) {
      event.preventDefault();
      enterPlatform();
    });

    document.getElementById('registerBtn').addEventListener('click', enterPlatform);
  </script>
</body>
</html>
