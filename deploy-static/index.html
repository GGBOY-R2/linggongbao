<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灵工保｜登录入口</title>
  <meta
    name="description"
    content="灵工保登录入口，支持劳务报酬代开确认、以票扣保、社保储备金联动与 AI 顾问服务。"
  />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="page-login">
  <div class="site-shell">
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./index.html">
          <img src="./1.jpg" alt="灵工保 Logo" />
          <span>灵工保</span>
        </a>
        <nav class="nav-links">
          <a href="./app.html#dashboard">首页</a>
          <a href="./app.html#settlement">劳务结算</a>
          <a href="./app.html#health">社保健康度</a>
          <a href="./app.html#ai-consultant">AI 顾问</a>
        </nav>
      </div>
    </header>

    <main class="site-main login-main">
      <section class="login-card entry-upgraded-card">
        <div class="login-logo">
          <img src="./1.jpg" alt="灵工保 Logo" />
        </div>
        <div class="login-copy">
          <span class="pill">2026 最新政策联动 Demo</span>
          <h1>欢迎进入灵工保</h1>
          <p>确认企业发起的劳务报酬代开申请，即可一站式领薪缴保，并同步沉淀社保储备金。</p>
        </div>

        <div class="entry-feature-list">
          <span class="entry-feature-item">劳务报酬代开确认</span>
          <span class="entry-feature-item">以票扣保联动</span>
          <span class="entry-feature-item">社保储备金实时更新</span>
          <span class="entry-feature-item">AI 顾问场景答复</span>
        </div>

        <div class="entry-tip">
          <strong>当前演示待办：</strong>
          某某技术公司劳务费 ¥2,000.00，预计税费 ¥20.00。进入后可直接体验“确认开票并预扣社保”完整流程。
        </div>

        <form id="loginForm" class="form-grid">
          <div class="input-group">
            <label for="account">手机号 / 账号</label>
            <input id="account" name="account" type="text" placeholder="请输入手机号或账号" />
          </div>
          <div class="input-group">
            <label for="password">验证码 / 密码</label>
            <input id="password" name="password" type="password" placeholder="请输入验证码或密码" />
          </div>
          <div class="action-row">
            <button type="submit" class="btn">进入平台</button>
            <button type="button" class="btn btn-secondary" id="registerBtn">查看演示页</button>
          </div>
        </form>

        <p class="helper-text">演示版本无需真实校验，点击“进入平台”或“查看演示页”即可进入新功能首页。</p>
      </section>
    </main>

    <footer class="site-footer">
      © 2026 灵工保 - 灵活就业者一站式领薪缴保服务平台
    </footer>
  </div>

  <script>
    function enterPlatform(anchor) {
      window.location.href = anchor ? `./app.html${anchor}` : './app.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function (event) {
      event.preventDefault();
      enterPlatform('#dashboard');
    });

    document.getElementById('registerBtn').addEventListener('click', function () {
      enterPlatform('#settlement');
    });
  </script>
</body>
</html>
